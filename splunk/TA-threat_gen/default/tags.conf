# Applies the CIM `vpn` tag to the eventtype defined in eventtypes.conf.
# This is the mechanism Exposure Analytics and the CIM Network_Sessions /
# Authentication data models use to identify VPN session events. The tag
# must be available at search time on any ASA VPN message (ASA-6-722051,
# ASA-4-113019, ASA-6-113004) emitted by ThreatGen.

[eventtype=threatgen_cisco_asa_vpn]
vpn = enabled
