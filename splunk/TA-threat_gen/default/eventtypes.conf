# Classifies Cisco ASA VPN session messages emitted by ThreatGen so that
# tags.conf can associate them with the CIM `vpn` tag. Exposure Analytics'
# out-of-the-box "ASA VPN Sessions" discovery source filters on
# `sourcetype=cisco:asa "Group <" tag=vpn ("assigned to session")`, and
# without this eventtype the filter would never match because nothing else
# in the ThreatGen stack sets tag=vpn.

[threatgen_cisco_asa_vpn]
search = sourcetype=cisco:asa (message_id=722051 OR message_id=113019 OR message_id=113004)
