# source:: stanzas take higher precedence than sourcetype-based stanzas from
# TAs or Splunk defaults, ensuring correct event breaking on both the forwarder
# and the indexer regardless of which other apps are installed.
#
# All ThreatGen sourcetypes emit single-line JSON. KV_MODE = json enables
# automatic field extraction; TIME_PREFIX locates the timestamp inside the
# JSON payload.
#
# TRANSFORMS-threatgen_entity_fields promotes the four Exposure Analytics key
# entity fields (nt_host, ip, user_id, mac) to indexed fields at ingest so
# streaming entity-discovery validation (which runs tstats-style checks on
# indexed fields only) can see them. The HEC forwarder also sends these keys
# via the HEC fields property; this block covers Universal Forwarder
# file-monitor deployments.
#
# The sourcetype-level EVAL-* dedupes below collapse multi-value duplicates of
# the four entity fields. When HEC sends the same keys in both `fields` and the
# JSON body, Splunk produces a 3-value multi-value field with identical values,
# which breaks ES Exposure Analytics data-model normalization (its nt_host /
# mac / user_id evals return null on MV inputs). Applying
# `mvindex(mvdedup(x), 0)` at search time yields a single-valued field for
# every downstream consumer without re-ingestion.

[source::threatgen:wineventlog]
sourcetype = WinEventLog:Security
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
TIME_PREFIX = "timestamp":"
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE = json
TZ = UTC
TRUNCATE = 0
TRANSFORMS-threatgen_entity_fields = threatgen_nt_host, threatgen_ip, threatgen_user_id, threatgen_mac

