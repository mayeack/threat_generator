# Canonical source-path stanzas. The HEC forwarder ships ThreatGen events with
# source values that match EA's OOB discovery-source filters (source="/var/log/
# secure" for Linux sshd, source="WinEventLog:Security" for Windows Security,
# and source="XmlWinEventLog:Microsoft-Windows-Sysmon/Operational" for Sysmon).
# Mirroring the parsing config here ensures Universal Forwarder file-monitor
# deployments classify the same way as HEC events, keeping EA validation
# consistent regardless of transport.

[source::WinEventLog:Security]
sourcetype = WinEventLog:Security
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
TIME_PREFIX = "timestamp":"
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE = json
TZ = UTC
TRUNCATE = 0
TRANSFORMS-threatgen_entity_fields = threatgen_nt_host, threatgen_ip, threatgen_user_id, threatgen_mac

[source::XmlWinEventLog:Microsoft-Windows-Sysmon/Operational]
sourcetype = XmlWinEventLog
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
TIME_PREFIX = "timestamp":"
MAX_TIMESTAMP_LOOKAHEAD = 32
KV_MODE = json
TZ = UTC
TRUNCATE = 0
TRANSFORMS-threatgen_entity_fields = threatgen_nt_host, threatgen_ip, threatgen_user_id, threatgen_mac

[source::/var/log/secure]
sourcetype = linux_secure
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%6N
