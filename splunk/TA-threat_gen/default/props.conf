TRUNCATE = 0
TRANSFORMS-threatgen_entity_fields = threatgen_nt_host, threatgen_ip, threatgen_user_id, threatgen_mac

# Sourcetype-level EVAL dedupes. Applied at search time regardless of source
# (HEC events carry source=http:<token-name>, file-monitor events carry
# source=threatgen:*). Ensures EA's data-model normalization sees single-valued
# nt_host / ip / mac / user_id.

[cisco:asa]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

[stream:dns]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

[stream:http]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

# Linux sshd events. EA's SSHD Auth Events discovery source keys on ``nt_host``.
# ThreatGen emits the JSON body with ``hostname`` (e.g. ``lnx-db02``) plus a
# ``nt_host`` duplicate, but a downstream Splunk_TA_nix / CIM FIELDALIAS aliases
# the Splunk ``host`` ("threatgen") onto ``nt_host``, overwriting the real
# Linux hostname. EVAL runs after FIELDALIAS in Splunk's precedence order, so
# we coalesce the JSON ``hostname`` back over ``nt_host`` here.
[linux_secure]
EVAL-nt_host = lower(coalesce(hostname, mvindex(mvdedup(nt_host), 0)))
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

# Windows Security channel: HEC/UF events are indexed as ``WinEventLog:Security``
# so ES predefined Kerberos discovery (data model) matches. Plain
# ``WinEventLog`` is only used by mis-classified or legacy inputs; keep EVALs
# for both.
[WinEventLog]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

# EA's Sysmon discovery source filter requires top-level ``User`` and
# ``SourceIp`` fields (it excludes ``NT AUTHORITY*`` users and loopback /
# IPv6 source IPs). ThreatGen's Sysmon formatter nests those inside the
# ``EventData`` object to match Microsoft's native XML schema, so KV_MODE=json
# surfaces them as ``EventData.User`` and ``EventData.SourceIp``. Lift them to
# the top level here so the OOB EA filter matches. ``user_id`` tracks the
# indexed key entity field that EA validates; we coalesce it to EventData.User
# for NetworkConnect (EventCode 3) events.
[XmlWinEventLog]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = coalesce(mvindex(mvdedup(user_id), 0), 'EventData.User')
EVAL-User = coalesce('EventData.User', User)
EVAL-SourceIp = coalesce('EventData.SourceIp', SourceIp)

# Primary EVALs for Windows Security (matches HEC + canonical ``[source::WinEventLog:Security]``).
[WinEventLog:Security]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

[XmlWinEventLog:Microsoft-Windows-Sysmon/Operational]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = coalesce(mvindex(mvdedup(user_id), 0), 'EventData.User')
EVAL-User = coalesce('EventData.User', User)
EVAL-SourceIp = coalesce('EventData.SourceIp', SourceIp)

# Fallbacks for events that still arrive with the pre-canonical lowercase
# sourcetype names (e.g., when hec.sourcetype_map hasn't been populated yet at
# runtime). Keeps EA Validate green during the migration window.

[wineventlog]
EVAL-nt_host = mvindex(mvdedup(nt_host), 0)
EVAL-ip = mvindex(mvdedup(ip), 0)
EVAL-mac = mvindex(mvdedup(mac), 0)
EVAL-user_id = mvindex(mvdedup(user_id), 0)

[xmlwineventlog]
