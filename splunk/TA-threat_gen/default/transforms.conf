# Index-time extractions of the four Exposure Analytics key entity fields
# (nt_host, ip, user_id, mac) from ThreatGen's single-line JSON payload.
# WRITE_META = true stores them as indexed fields so Splunk ES Exposure
# Analytics streaming entity discovery can validate their presence via
# indexed-field / tstats checks without relying on search-time KV_MODE = json.
#
# The regex targets the canonical ThreatGen JSON layout (single-line,
# double-quoted keys, no whitespace between key and value). The companion
# props.conf references these stanzas via TRANSFORMS-threatgen_entity_fields
# on every [source::threatgen:*] stanza.

[threatgen_nt_host]
REGEX = "nt_host":"([^"]+)"
FORMAT = nt_host::$1
WRITE_META = true

[threatgen_ip]
REGEX = "ip":"([^"]+)"
FORMAT = ip::$1
WRITE_META = true

[threatgen_user_id]
REGEX = "user_id":"([^"]+)"
FORMAT = user_id::$1
WRITE_META = true

[threatgen_mac]
REGEX = "mac":"([^"]+)"
FORMAT = mac::$1
WRITE_META = true
