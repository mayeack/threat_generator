# Declare the four Exposure Analytics entity keys as indexed fields so
# searches and tstats use the values written to metadata by transforms.conf
# (WRITE_META = true) instead of re-extracting them via search-time KV.
# This is what makes the keys visible to Splunk ES Exposure Analytics'
# streaming entity discovery validation.

[nt_host]
INDEXED = true

[ip]
INDEXED = true

[user_id]
INDEXED = true

[mac]
INDEXED = true
