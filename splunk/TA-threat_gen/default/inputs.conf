# TA-threat_gen ships no enabled default inputs.
#
# ThreatGen delivers events via HTTP Event Collector (HEC), so no file monitors
# are required on Splunk Cloud indexers or search heads. If you are running an
# on-prem Universal Forwarder that tails the ThreatGen log files, create a
# local/inputs.conf with your own [monitor://] stanzas (set index = threat_gen,
# the matching sourcetype, and source = threatgen:<family>). See README.txt for
# an example block.
