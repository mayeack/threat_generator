[Threat Hunt - Create Notable]
description = Reads pending PEAK hunt findings from the threat_hunt_notable_staging KV store and creates Notable Events in Splunk ES. The agent writes findings to the staging table; this search picks them up every minute and fires the notable alert action per result.
search = | inputlookup threat_hunt_notable_staging \
| where isnotnull(rule_name) AND status="pending" \
| eval status="processed", processed_time=now(), \
       _time=if(isnotnull(_time), _time, now()), \
       info_min_time="-24h", info_max_time="+0s" \
| outputlookup threat_hunt_notable_staging key_field=_key
cron_schedule = */1 * * * *
enableSched = 1
disabled = 0
dispatch.earliest_time = -24h
dispatch.latest_time = now
alert.suppress = 0
alert.track = 1
alert.digest_mode = 0
counttype = number of events
quantity = 0
relation = greater than
action.correlationsearch.enabled = 1
action.correlationsearch.label = Threat Hunt - Create Notable
action.notable = 1
action.notable.param.security_domain = $result.security_domain$
action.notable.param.severity = $result.severity$
action.notable.param.rule_title = $result.rule_name$
action.notable.param.rule_description = $result.rule_description$
action.notable.param.drilldown_search = $result.drilldown_search$
action.notable.param.drilldown_name = $result.drilldown_name$
action.notable.param.nes_fields = src,dest,user,mitre_attack_id
