<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatGen</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">&#9763;</span>
        <span class="brand-text">ThreatGen</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-link active" data-page="dashboard">
          <span class="nav-icon">&#9678;</span> Dashboard
        </a>
        <a href="#" class="nav-link" data-page="logs">
          <span class="nav-icon">&#9776;</span> Log Viewer
        </a>
        <a href="#" class="nav-link" data-page="config">
          <span class="nav-icon">&#9881;</span> Configuration
        </a>
        <a href="#" class="nav-link" data-page="topology">
          <span class="nav-icon">&#9733;</span> Topology
        </a>
        <a href="#" class="nav-link" data-page="campaigns">
          <span class="nav-icon">&#9888;</span> Campaigns
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="engine-status" id="engine-status-indicator">
          <span class="status-dot idle"></span>
          <span class="status-text">Idle</span>
        </div>
      </div>
    </aside>
    <main class="content" id="main-content">
      <!-- Pages injected by JS -->
    </main>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/log-viewer.js"></script>
  <script src="/js/config-editor.js"></script>
  <script src="/js/topology-editor.js"></script>
  <script src="/js/campaigns.js"></script>
</body>
</html>
